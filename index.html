<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>玄繕 業務管理</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a18;--ink2:#4a4a46;--ink3:#8a8a84;--bg:#faf9f6;--bg2:#f4f2ec;--stone:#e8e5dc;--bdr:#d8d4c8;--gold:#8a7a5a;--red:#8a2c2c;--grn:#2c6a3e;--serif:'Shippori Mincho',serif;--sans:'Noto Sans JP',sans-serif;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg2);color:var(--ink);font-size:14px;min-height:100vh;padding-bottom:72px}
.hdr{background:var(--ink);color:var(--bg);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-family:var(--serif);font-size:17px;letter-spacing:.1em}
.logo small{font-family:var(--sans);font-size:10px;opacity:.5;margin-left:8px;font-weight:300}
.dot{width:8px;height:8px;border-radius:50%;background:#666;display:inline-block}.dot.ok{background:#4a8}.dot.err{background:var(--red)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bdr);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav button{flex:1;border:none;background:none;padding:8px 0 6px;font-size:10px;color:var(--ink3);font-family:var(--sans);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.bnav button.on{color:var(--ink);font-weight:500}
.bnav svg{width:22px;height:22px}
.pg{display:none;padding:16px;max-width:640px;margin:0 auto}.pg.on{display:block}
.cd{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ct{font-family:var(--serif);font-size:14px;font-weight:500;margin-bottom:12px;color:var(--ink2);letter-spacing:.06em}
label{display:block;font-size:12px;color:var(--ink3);margin-bottom:4px}
input,select,textarea{width:100%;border:1px solid var(--bdr);border-radius:6px;padding:9px 10px;font-size:14px;font-family:var(--sans);background:#fff;color:var(--ink);margin-bottom:10px;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(138,122,90,.15)}
textarea{resize:vertical;min-height:60px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;padding:11px 20px;font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:.15s;width:100%}
.bp{background:var(--ink);color:#fff}.bp:hover{background:#333}.bp:disabled{opacity:.4;cursor:not-allowed}
.bs{background:transparent;color:var(--ink);border:1px solid var(--bdr)}.bs:hover{background:var(--stone)}
.bsm{padding:7px 14px;font-size:12px}
.brow{display:flex;gap:8px;margin-top:12px}
.iw{overflow-x:auto;margin:8px -4px}
.it{width:100%;border-collapse:collapse;font-size:12px;min-width:480px}
.it th{background:var(--stone);padding:6px 4px;font-weight:500;text-align:left;font-size:11px;white-space:nowrap}
.it td{padding:4px;border-bottom:1px solid var(--stone);vertical-align:middle}
.it input,.it select{margin-bottom:0;padding:6px 4px;font-size:12px;border-radius:4px}
.ci{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ci:active{background:var(--stone)}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
.ld{text-align:center;padding:20px;color:var(--ink3);font-size:13px}
.sp{width:24px;height:24px;border:2px solid var(--stone);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.pz{border:1.5px dashed var(--bdr);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer}
.pz:active{background:var(--stone)}
.pg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:6px;margin-top:10px}
.pt{width:100%;aspect-ratio:1;border-radius:6px;object-fit:cover;border:1px solid var(--bdr)}
/* 書類プレビュー */
.dp{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:24px 20px;font-size:13px;line-height:1.7}
.dp .dtt{text-align:center;margin-bottom:20px}
.dp .dtx{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:.15em;border-bottom:2px solid var(--ink);display:inline-block;padding-bottom:4px}
.dp table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.dp th{background:var(--ink);color:#fff;padding:6px 8px;font-weight:500;text-align:left}
.dp td{padding:6px 8px;border-bottom:1px solid var(--stone)}
.stamp{width:60px;height:60px;border:2px solid var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--red);font-family:var(--serif);font-size:14px;font-weight:600}
/* ★修正⑤: 印刷CSS — プレビュー領域のみ表示 */
@media print{
  body{background:#fff;padding:0;margin:0}
  .hdr,.bnav,.np,.brow,.cd,.ct{display:none!important}
  .pg{display:none!important}
  #pg-docs{display:block!important;max-width:none;padding:0;margin:0}
  #parea{display:block!important;margin:0!important}
  #dact{display:none!important}
  .dp{border:none;padding:10mm 15mm;font-size:10pt;box-shadow:none;page-break-inside:avoid}
  .dp th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">玄繕<small>業務管理</small></div>
  <span class="dot" id="dot"></span>
</div>
<div class="toast" id="toast"></div>

<!-- 案件一覧 -->
<div class="pg on" id="pg-list">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="ct" style="margin:0">案件一覧</div>
    <button class="btn bp bsm" onclick="newCase()">＋ 新規</button>
  </div>
  <div id="clist"><div class="ld"><div class="sp"></div>読み込み中...</div></div>
</div>

<!-- 案件登録/編集 -->
<div class="pg" id="pg-edit">
  <div class="ct" id="etitle">新規案件登録</div>
  <div class="cd">
    <input type="hidden" id="f-no">
    <div class="r2">
      <div><label>日付</label><input type="date" id="f-date"></div>
      <div><label>作業種別</label>
        <select id="f-type"><option>石材クリーニング</option><option>石材研磨</option><option>石材補修</option><option>石材コーティング</option><option>その他</option></select>
      </div>
    </div>
    <label>顧客名</label>
    <input type="text" id="f-client" list="dlc" placeholder="顧客名を入力">
    <datalist id="dlc"></datalist>
    <label>現場名</label>
    <input type="text" id="f-site" placeholder="現場名・住所">
  </div>
  <div class="cd">
    <div class="ct">明細</div>
    <div class="iw"><table class="it"><thead><tr><th style="width:35%">内容</th><th style="width:8%">単位</th><th style="width:15%">単価</th><th style="width:8%">数量</th><th style="width:14%">税</th><th style="width:12%;text-align:right">金額</th><th style="width:8%"></th></tr></thead><tbody id="ib"></tbody></table></div>
    <button class="btn bs bsm" onclick="addRow('ib')" style="margin-top:6px">＋ 行追加</button>
    <div style="text-align:right;margin-top:8px;font-size:15px;font-weight:500">合計: <span id="itotal">¥0</span></div>
  </div>
  <div class="cd">
    <div class="ct">原価</div>
    <div class="r3">
      <div><label>材料費</label><input type="number" id="f-mat" value="0" oninput="calcCost()"></div>
      <div><label>作業時間(h)</label><input type="number" id="f-hrs" value="0" step="0.5" oninput="calcCost()"></div>
      <div><label>単価/h</label><input type="number" id="f-rate" value="2000" oninput="calcCost()"></div>
    </div>
    <div style="font-size:12px;color:var(--ink3);margin-top:4px">原価: <span id="ctotal">¥0</span> ／ 利益: <span id="cprofit">¥0</span></div>
  </div>
  <div class="cd">
    <div class="ct">写真</div>
    <div class="pz" onclick="document.getElementById('pi').click()">📷 タップして撮影・選択</div>
    <input type="file" id="pi" accept="image/*" capture="environment" multiple style="display:none" onchange="addPhotos(this)">
    <div class="pg-grid" id="pgrid"></div>
  </div>
  <div class="cd">
    <label>備考</label><textarea id="f-note" rows="2" placeholder="備考・メモ"></textarea>
  </div>
  <div class="brow">
    <button class="btn bs" onclick="nav('list')">戻る</button>
    <button class="btn bp" id="bsave" onclick="saveCase()">保存</button>
  </div>
</div>

<!-- 書類発行 -->
<div class="pg" id="pg-docs">
  <div class="ct">書類発行</div>
  <div class="cd">
    <div class="r2">
      <div><label>書類種別</label>
        <select id="d-type" onchange="mkDocNo()"><option value="見積書">見積書</option><option value="請求書">請求書</option><option value="納品書">納品書</option><option value="報告書">報告書</option></select>
      </div>
      <div><label>書類番号</label><input type="text" id="d-no" readonly></div>
    </div>
    <div class="r2">
      <div><label>発行日</label><input type="date" id="d-date"></div>
      <div><label>支払期限</label><input type="date" id="d-due"></div>
    </div>
    <label>案件</label>
    <select id="d-case" onchange="loadDocCase()"><option value="">案件を選択...</option></select>
    <div class="r2" style="margin-top:8px">
      <div><label>顧客名</label><input type="text" id="d-client"></div>
      <div><label>現場名</label><input type="text" id="d-site"></div>
    </div>
  </div>
  <div class="cd">
    <div class="ct">明細</div>
    <div class="iw"><table class="it"><thead><tr><th style="width:35%">内容</th><th style="width:8%">単位</th><th style="width:15%">単価</th><th style="width:8%">数量</th><th style="width:14%">税</th><th style="width:12%;text-align:right">金額</th><th style="width:8%"></th></tr></thead><tbody id="db"></tbody></table></div>
    <button class="btn bs bsm" onclick="addRow('db')" style="margin-top:6px">＋ 行追加</button>
    <div style="text-align:right;margin-top:8px;font-size:15px;font-weight:500">合計: <span id="dtotal">¥0</span></div>
  </div>
  <div class="cd"><label>備考</label><textarea id="d-note" rows="2"></textarea></div>
  <div class="brow np">
    <button class="btn bs" onclick="nav('list')">戻る</button>
    <button class="btn bp" onclick="preview()">プレビュー</button>
  </div>
  <div id="parea" style="margin-top:16px;display:none"></div>
  <div class="brow np" id="dact" style="display:none">
    <button class="btn bs" onclick="window.print()">🖨 印刷/PDF</button>
    <button class="btn bp" onclick="issueGas()">📊 シート記録</button>
  </div>
</div>

<!-- 設定 -->
<div class="pg" id="pg-set">
  <div class="ct">設定</div>
  <div class="cd">
    <label>GAS URL</label>
    <input type="text" id="s-gas">
    <button class="btn bp bsm" onclick="saveSetting()" style="margin-top:4px">保存して接続テスト</button>
    <div id="s-res" style="font-size:12px;margin-top:8px;color:var(--ink3)"></div>
  </div>
  <div class="cd">
    <label>人件費単価</label><input type="number" id="s-rate" value="2000">
    <label>会社情報（書類用）</label><textarea id="s-co" rows="4" placeholder="会社名&#10;住所&#10;TEL"></textarea>
    <button class="btn bs bsm" onclick="saveCoInfo()" style="margin-top:4px">保存</button>
  </div>
</div>

<!-- ナビ -->
<div class="bnav">
  <button class="on" onclick="nav('list')" id="n-list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>案件</button>
  <button onclick="newCase()" id="n-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>登録</button>
  <button onclick="nav('docs')" id="n-docs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>書類</button>
  <button onclick="nav('set')" id="n-set"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>設定</button>
</div>

<script>
/* ═══ 玄繕 業務管理アプリ — 修正版 ═══ */
var GAS=ls('genzen_gas')||'https://script.google.com/macros/s/AKfycbwZ4CoNIhK4y7G4TOwCgp6Wb2VElAgPxp1m-wdqXFMdU4vAldegwFaIbM5-1-4JfYC0/exec';
var RATE=parseInt(ls('genzen_rate')||'2000',10);
var CO=ls('genzen_co')||'玄繕\n福岡県福岡市博多区博多駅前';
var cases=[],photos=[],ddInit=false;

function ls(k,v){if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v)}
function $(id){return document.getElementById(id)}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function num(n){return(Math.round(Number(n)||0)).toLocaleString()}
function today(){return new Date().toISOString().slice(0,10)}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function dot(ok){$('dot').className='dot'+(ok?' ok':' err')}
function jpDate(s){if(!s)return'';var p=s.split('-');return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日'}

/* ─── ナビ ─── */
function nav(p){
  document.querySelectorAll('.pg').forEach(function(e){e.classList.remove('on')});
  document.querySelectorAll('.bnav button').forEach(function(e){e.classList.remove('on')});
  var el=$('pg-'+p);if(el)el.classList.add('on');
  var nb=$('n-'+p);if(nb)nb.classList.add('on');
  if(p==='list')loadCases();
  if(p==='docs')initDocs();
  if(p==='set')initSet();
}

function newCase(){
  $('f-no').value='';$('etitle').textContent='新規案件登録';
  $('f-date').value=today();$('f-client').value='';$('f-site').value='';
  $('f-type').selectedIndex=0;$('f-note').value='';
  $('f-mat').value='0';$('f-hrs').value='0';$('f-rate').value=RATE;
  $('ib').innerHTML='';$('pgrid').innerHTML='';photos=[];
  addRow('ib');calcCost();nav('edit');
}

/* ─── 案件一覧 ─── */
function loadCases(){
  $('clist').innerHTML='<div class="ld"><div class="sp"></div>読み込み中...</div>';
  gGet('getCases').then(function(d){
    cases=(d&&d.cases)||[];renderList();dot(true);fillClients();fillDocSel();
  }).catch(function(e){
    $('clist').innerHTML='<div class="ld" style="color:var(--red)">接続エラー</div>';dot(false);
  });
}

function renderList(){
  if(!cases.length){$('clist').innerHTML='<div class="ld">案件がありません</div>';return}
  var h='';
  for(var i=cases.length-1;i>=0;i--){
    var c=cases[i],done=(c.status||'').indexOf('発行済')!==-1;
    h+='<div class="ci" onclick="openCase(\''+esc(c.no)+'\')">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    h+='<span style="font-family:var(--serif);font-weight:500;font-size:14px">'+esc(c.no)+'</span>';
    h+='<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:'+(done?'#d4edda':'var(--stone)')+';color:'+(done?'var(--grn)':'var(--ink2)')+'">'+esc(c.status||'作業中')+'</span>';
    h+='</div>';
    h+='<div style="font-size:12px;color:var(--ink3)">'+esc(c.client||'')+' — '+esc(c.site||'')+'</div>';
    h+='<div style="font-size:12px;color:var(--ink3)">'+esc(c.date||'')+' / '+esc(c.type||'')+'</div>';
    h+='<div style="font-size:15px;font-weight:500;text-align:right;margin-top:4px">¥'+num(c.total)+'</div>';
    h+='</div>';
  }
  $('clist').innerHTML=h;
}

function openCase(no){
  var c=null;for(var i=0;i<cases.length;i++)if(cases[i].no===no){c=cases[i];break}
  if(!c)return;
  $('f-no').value=c.no;$('etitle').textContent='案件編集: '+c.no;
  $('f-date').value=c.date||today();$('f-client').value=c.client||'';
  $('f-site').value=c.site||'';$('f-note').value=c.note||'';
  $('f-mat').value=c.costMaterial||0;$('f-hrs').value=c.costHours||0;$('f-rate').value=RATE;
  photos=[];$('pgrid').innerHTML='';
  var ts=$('f-type');for(var t=0;t<ts.options.length;t++)if(ts.options[t].value===c.type)ts.selectedIndex=t;
  $('ib').innerHTML='';
  if(c.items&&c.items.length)for(var j=0;j<c.items.length;j++)addRow('ib',c.items[j]);
  else addRow('ib');
  recalc('ib','itotal');calcCost();nav('edit');
}

/* ★修正④: fillClients — GASのgetClientsから顧客マスターを取得 */
function fillClients(){
  gGet('getClients').then(function(d){
    var dl=$('dlc');dl.innerHTML='';
    var list=(d&&d.clients)||[];
    list.forEach(function(n){var o=document.createElement('option');o.value=n;dl.appendChild(o)});
  }).catch(function(){});
}

/* ─── 明細行 ─── */
function addRow(tid,d){
  d=d||{};var tb=$(tid),tr=document.createElement('tr');
  var totalId=tid==='ib'?'itotal':'dtotal';
  tr.innerHTML=
    '<td><input type="text" value="'+esc(d.desc||'')+'" placeholder="作業内容" oninput="recalc(\''+tid+'\',\''+totalId+'\')"></td>'+
    '<td><select><option'+(d.unit==='式'||!d.unit?' selected':'')+'>式</option><option'+(d.unit==='m²'?' selected':'')+'>m²</option><option'+(d.unit==='枚'?' selected':'')+'>枚</option><option'+(d.unit==='本'?' selected':'')+'>本</option><option'+(d.unit==='個'?' selected':'')+'>個</option><option'+(d.unit==='時間'?' selected':'')+'>時間</option></select></td>'+
    '<td><input type="number" value="'+(d.price||'')+'" placeholder="0" oninput="recalc(\''+tid+'\',\''+totalId+'\')"></td>'+
    '<td><input type="number" value="'+(d.qty||1)+'" placeholder="1" oninput="recalc(\''+tid+'\',\''+totalId+'\')"></td>'+
    '<td><select onchange="recalc(\''+tid+'\',\''+totalId+'\')">'+'<option value="10%"'+((!d.taxType||d.taxType==='10%')?' selected':'')+'>10%</option>'+'<option value="8%軽減"'+(d.taxType==='8%軽減'||d.taxType==='8%'?' selected':'')+'>8%</option>'+'<option value="非課税"'+(d.taxType==='非課税'?' selected':'')+'>非課税</option></select></td>'+
    '<td style="text-align:right;font-weight:500;white-space:nowrap">¥0</td>'+
    '<td style="text-align:center"><button style="padding:4px 8px;background:none;border:none;color:var(--red);font-size:16px;cursor:pointer" onclick="this.closest(\'tr\').remove();recalc(\''+tid+'\',\''+totalId+'\')">×</button></td>';
  tb.appendChild(tr);recalc(tid,totalId);
}

function getItems(tid){
  var rows=document.querySelectorAll('#'+tid+' tr'),items=[],gt=0;
  for(var i=0;i<rows.length;i++){
    var inp=rows[i].querySelectorAll('input'),sel=rows[i].querySelectorAll('select');
    var desc=inp[0]?inp[0].value:'',price=inp[1]?parseFloat(inp[1].value)||0:0,qty=inp[2]?parseFloat(inp[2].value)||1:1;
    var unit=sel[0]?sel[0].value:'式',tax=sel[1]?sel[1].value:'10%';
    var amt=price*qty,tr=tax==='非課税'?0:(tax==='8%軽減'?0.08:0.1),txAmt=Math.floor(amt*tr),tot=amt+txAmt;
    var tc=rows[i].querySelectorAll('td');if(tc[5])tc[5].textContent='¥'+num(tot);
    gt+=tot;
    items.push({desc:desc,unit:unit,price:price,qty:qty,total:amt,taxType:tax,tax:txAmt,taxIncluded:tot});
  }
  return{items:items,total:gt};
}

function recalc(tid,totalId){var r=getItems(tid);$(totalId).textContent='¥'+num(r.total);if(tid==='ib')calcCost()}

function calcCost(){
  var r=getItems('ib'),mat=parseFloat($('f-mat').value)||0,hrs=parseFloat($('f-hrs').value)||0,rate=parseFloat($('f-rate').value)||RATE;
  var lab=hrs*rate,ct=mat+lab,pf=r.total-ct;
  $('ctotal').textContent='¥'+num(ct);$('cprofit').textContent='¥'+num(pf);
  $('cprofit').style.color=pf>=0?'var(--grn)':'var(--red)';
}

/* ─── 保存 ─── */
function saveCase(){
  var btn=$('bsave');btn.disabled=true;btn.textContent='保存中...';
  var r=getItems('ib'),cno=$('f-no').value,isUp=!!cno;
  var p={
    action:isUp?'updateCase':'saveCase',
    date:$('f-date').value,client:$('f-client').value,site:$('f-site').value,
    type:$('f-type').value,items:JSON.stringify(r.items),total:r.total,
    costMaterial:parseFloat($('f-mat').value)||0,
    costHours:parseFloat($('f-hrs').value)||0,
    costRate:parseFloat($('f-rate').value)||RATE,
    note:$('f-note').value,status:'作業中'
  };
  if(isUp)p.caseNo=cno;

  gPost(p).then(function(d){
    if(d&&(d.caseNo||d.updated)){
      toast('保存しました'+(d.caseNo?' ['+d.caseNo+']':''));
      var sno=d.caseNo||cno;
      upPhotos(sno);nav('list');
    }else{
      toast('送信完了（シートを確認）');nav('list');
    }
  }).catch(function(){
    toast('送信完了（シートを確認）');nav('list');
  }).finally(function(){btn.disabled=false;btn.textContent='保存'});
}

/* ─── 写真 ─── */
function addPhotos(inp){
  for(var i=0;i<inp.files.length;i++){
    (function(f){var rd=new FileReader();rd.onload=function(e){photos.push(e.target.result);renderPh()};rd.readAsDataURL(f)})(inp.files[i]);
  }
  inp.value='';
}
function renderPh(){
  var h='';for(var i=0;i<photos.length;i++)h+='<img class="pt" src="'+photos[i]+'" onclick="photos.splice('+i+',1);renderPh()">';
  $('pgrid').innerHTML=h;
}
function upPhotos(cno){
  if(!photos.length)return;
  for(var i=0;i<photos.length;i++){
    var b=photos[i].split(',')[1];if(!b)continue;
    gPost({action:'uploadPhoto',caseNo:cno,photoData:b,fileName:'photo_'+(i+1)+'_'+Date.now()+'.jpg'}).catch(function(){});
  }
}

/* ─── 書類発行 ─── */
function initDocs(){
  if(!ddInit){$('d-date').value=today();var d=new Date();d.setMonth(d.getMonth()+2);d.setDate(0);$('d-due').value=d.toISOString().slice(0,10);ddInit=true}
  mkDocNo();fillDocSel();
  if(!document.querySelectorAll('#db tr').length)addRow('db');
}
function mkDocNo(){
  var t=$('d-type').value,px={見積書:'EST',請求書:'INV',納品書:'DLV',報告書:'RPT'}[t]||'DOC';
  var d=new Date(),ymd=String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  $('d-no').value=px+'-'+ymd+'-001';
}
function fillDocSel(){
  var sel=$('d-case'),cv=sel.value;sel.innerHTML='<option value="">案件を選択...</option>';
  for(var i=cases.length-1;i>=0;i--){
    var c=cases[i],o=document.createElement('option');o.value=c.no;
    o.textContent=c.no+' - '+(c.client||'')+' '+(c.site||'');sel.appendChild(o);
  }
  if(cv)sel.value=cv;
}
function loadDocCase(){
  var no=$('d-case').value;if(!no)return;
  var c=null;for(var i=0;i<cases.length;i++)if(cases[i].no===no){c=cases[i];break}
  if(!c)return;
  $('d-client').value=c.client||'';$('d-site').value=c.site||'';
  $('db').innerHTML='';
  if(c.items&&c.items.length)for(var j=0;j<c.items.length;j++)addRow('db',c.items[j]);
  else addRow('db');
  recalc('db','dtotal');
}

  var r=getItems('db'),items=r.items,total=r.total;

  for(var j=0;j<items.length;j++){

    h+='<tr><td>'+esc(it.desc)+'</td><td>'+esc(it.unit)+'</td><td style="text-align:right">¥'+num(it.price)+'</td><td style="text-align:right">'+it.qty+'</td><td style="text-align:right">'+esc(it.taxType==='非課税'?'非課税':it.taxType)+'</td><td style="text-align:right">¥'+num(it.taxIncluded)+'</td></tr>';
  }
  h+='</tbody></table>';
  h+='<div style="font-size:12px;margin:8px 0;color:var(--ink3)">';
  if(b10>0)h+='10%対象: ¥'+num(b10)+' (税¥'+num(t10)+') ';
  if(b8>0)h+='8%対象: ¥'+num(b8)+' (税¥'+num(t8)+')';
  h+='</div>';
  if(note){h+='<div style="margin-top:12px;padding:10px;background:var(--bg2);border-radius:6px;font-size:12px"><div style="font-weight:500;margin-bottom:4px">備考</div>'+esc(note).replace(/\n/g,'<br>')+'</div>'}
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:24px">';
  h+='<div style="display:flex;justify-content:flex-end"><div class="stamp">玄繕</div></div>';

function issueGas(){
  var r=getItems('db');
  var p={action:'issueDoc',docType:$('d-type').value,docNo:$('d-no').value,
    caseNo:$('d-case').value||'',client:$('d-client').value,site:$('d-site').value,
    date:$('d-date').value,dueDate:$('d-due').value,items:JSON.stringify(r.items),total:r.total,note:$('d-note').value};
  gPost(p).then(function(d){
    toast(d&&d.status==='ok'?'シートに記録しました':'送信完了');
  }).catch(function(){toast('送信完了（確認中）')});
}

/* ─── 設定 ─── */
function initSet(){$('s-gas').value=GAS;$('s-rate').value=RATE;$('s-co').value=CO}
function saveSetting(){
  var u=$('s-gas').value.trim();if(!u){toast('URLを入力');return}
  ls('genzen_gas',u);GAS=u;$('s-res').textContent='テスト中...';
  gGet('getCases').then(function(d){
    if(d&&d.cases!==undefined){$('s-res').innerHTML='✅ 接続成功 (案件数:'+d.cases.length+')';dot(true)}
    else{$('s-res').innerHTML='❌ エラー: '+(d?d.error:'不明');dot(false)}
  }).catch(function(e){$('s-res').innerHTML='❌ 接続失敗';dot(false)});
}
function saveCoInfo(){
  RATE=parseInt($('s-rate').value,10)||2000;CO=$('s-co').value;
  ls('genzen_rate',RATE);ls('genzen_co',CO);toast('保存しました');
}

/* ─── GAS通信 ─── */
function gGet(action){
  return fetch(GAS+'?action='+encodeURIComponent(action),{redirect:'follow'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()});
}

function gPost(p){
  // GAS POST→302リダイレクトでbody消失を回避: 全てGETで送る
  // actionはURLパラメータ、残りはpayloadにJSON化して送る
  var action=p.action||'';
  var payload=JSON.stringify(p);
  var url=GAS+'?action='+encodeURIComponent(action)+'&payload='+encodeURIComponent(payload);

  // URL長制限チェック（約8000文字まで安全）
  if(url.length>7500){
    // 写真など大きいデータはno-cors POSTで送信（レスポンス不要）
    return fetch(GAS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:payload})
      .then(function(){return{status:'sent-nocors'}});
  }

  return fetch(url,{redirect:'follow'})
    .then(function(r){return r.json()})
    .catch(function(){return{status:'sent'}});
}

/* ─── 初期化 ─── */
// 古いキャッシュURLを強制クリア（デプロイURL変更対応）
localStorage.removeItem('genzen_gas');
loadCases();
